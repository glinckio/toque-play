# Sentry source map upload — backend (NestJS via tsc)
#
# Requires:
#   - SENTRY_AUTH_TOKEN  (Auth token with project:write scope)
#   - SENTRY_ORG         (organization slug)
#   - SENTRY_PROJECT     (project slug, e.g. toqueplay-backend)
#   - SENTRY_DSN         (already in .env)
#
# Run after `pnpm run build` in CI/prod builds:
#   pnpm run sentry:upload
#
# If not configured, the script is a no-op (Sentry will still receive events,
# just with minified stack traces).
defaults.url=https://sentry.io
defaults.org=$(SENTRY_ORG)
defaults.project=$(SENTRY_PROJECT)
